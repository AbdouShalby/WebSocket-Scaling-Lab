# WebSocket-aware load balancer for the ws fleet.
worker_processes auto;
events { worker_connections 65536; }

http {
  upstream ws_fleet {
    # docker's embedded DNS resolves the service name to every replica
    server ws:8080;
  }

  server {
    listen 8080;

    location / {
      proxy_pass http://ws_fleet;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      # Long-lived connections: do not let nginx kill idle sockets under the
      # app's heartbeat interval
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }
  }
}
