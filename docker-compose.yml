# Fleet topology: N ws instances behind nginx, one Redis, one publisher.
#
#   docker compose up --build --scale ws=4
#   node bench/connect-storm.js --url ws://localhost:8080 --conns 5000
#
services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  ws:
    build: .
    environment:
      REDIS_HOST: redis
    depends_on: [redis]
    ulimits:
      nofile: { soft: 65536, hard: 65536 }

  lb:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports: ["8080:8080"]
    depends_on: [ws]

  publisher:
    build: .
    command: ["node", "src/publisher.js", "--rate", "50", "--channels", "20"]
    environment:
      REDIS_HOST: redis
    depends_on: [redis]
